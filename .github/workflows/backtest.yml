name: Backtest Validation

on:
  pull_request:
    paths:
      - "backend/strategies/**"
      - "backend/backtest/**"
      - "backend/engine/**"
      - "config/strategies.yaml"
      - "backend/tests/backtest_baselines.json"

jobs:
  strategy-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run strategy unit tests
        working-directory: backend
        run: |
          python -m pytest tests/test_strategies/ -v --tb=short

      - name: Run backtest engine tests
        working-directory: backend
        run: |
          python -m pytest tests/test_backtest/ -v --tb=short

  backtest-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run KR + US 2y backtest and compare to baseline
        working-directory: backend
        run: |
          python scripts/ci_backtest_gate.py
