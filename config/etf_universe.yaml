# ETF Universe Configuration
# Leveraged/Inverse ETF pairs and sector ETF mappings

# Bull/Bear leveraged pairs for regime-based trading
leveraged_pairs:
  QQQ:    { bull: TQQQ, bear: SQQQ, leverage: 3 }
  SPY:    { bull: UPRO, bear: SPXU, leverage: 3 }
  SOXX:   { bull: SOXL, bear: SOXS, leverage: 3 }
  XLK:    { bull: TECL, bear: TECS, leverage: 3 }
  ARKK:   { bull: null, bear: SARK, leverage: 1 }

# Sector ETFs (standard 1x)
sectors:
  Technology:
    etf: XLK
    leveraged: TECL
    top_holdings: [AAPL, MSFT, NVDA, AVGO, ADBE]
    mid_holdings: [CRWD, PANW, FTNT, SNPS, CDNS]
  Financials:
    etf: XLF
    leveraged: FAS
    top_holdings: [BRK-B, JPM, V, MA, BAC]
    mid_holdings: [FITB, CFG, RF, KEY, HBAN]
  Energy:
    etf: XLE
    leveraged: ERX
    top_holdings: [XOM, CVX, COP, EOG, SLB]
    mid_holdings: [DVN, FANG, MPC, VLO, OXY]
  Healthcare:
    etf: XLV
    leveraged: LABU
    top_holdings: [UNH, JNJ, LLY, ABBV, MRK]
    mid_holdings: [DXCM, ALGN, HOLX, PODD, INSP]
  Consumer_Discretionary:
    etf: XLY
    leveraged: null
    top_holdings: [AMZN, TSLA, HD, MCD, NKE]
    mid_holdings: [DECK, POOL, WSM, GRMN, ULTA]
  Consumer_Staples:
    etf: XLP
    leveraged: null
    top_holdings: [PG, KO, PEP, COST, WMT]
    mid_holdings: [ELF, CELH, CASY, USFD, PFGC]
  Industrials:
    etf: XLI
    leveraged: null
    top_holdings: [CAT, UNP, HON, GE, RTX]
    mid_holdings: [TDG, AXON, HUBB, WSO, RBC]
  Materials:
    etf: XLB
    leveraged: null
    top_holdings: [LIN, APD, SHW, FCX, NEM]
    mid_holdings: [CRS, ATI, STLD, CLF, CMC]
  Utilities:
    etf: XLU
    leveraged: null
    top_holdings: [NEE, SO, DUK, D, AEP]
    mid_holdings: [IDA, NRG, VST, OGE, PNW]
  Real_Estate:
    etf: XLRE
    leveraged: null
    top_holdings: [PLD, AMT, EQIX, PSA, SPG]
    mid_holdings: [REXR, FR, EGP, CUBE, LSI]
  Communications:
    etf: XLC
    leveraged: null
    top_holdings: [META, GOOGL, NFLX, DIS, CMCSA]
    mid_holdings: [ROKU, ZM, MTCH, IAC, PINS]

# Safe-haven / cash-equivalent ETFs
safe_haven:
  - SHY   # 1-3yr Treasury
  - TLT   # 20+yr Treasury
  - GLD   # Gold
  - UUP   # US Dollar

# VIX-related
volatility:
  - VXX   # VIX Short-Term Futures
  - UVXY  # 2x VIX
  - SVXY  # -0.5x VIX

# Exchange codes for KIS API (NASD=Nasdaq, NYSE, AMEX=NYSE Arca)
# Most ETFs trade on NYSE Arca (AMEX). Only list exceptions here.
# ETFs not listed default to AMEX.
exchanges:
  TQQQ: NASD
  SQQQ: NASD
  QQQ: NASD
  ARKK: NASD
  SARK: NASD
  SOXX: NASD
  SOXL: NASD
  SOXS: NASD
  TECL: NASD
  TECS: NASD
  SHY: NASD
  TLT: NASD

# Risk limits for leveraged ETFs
risk_rules:
  max_hold_days: 20        # No holding leveraged >20 days (backtest: 10d too short)
  max_portfolio_pct: 0.20  # Max 20% in leveraged ETFs
  max_single_etf_pct: 0.10 # Max 10% in single ETF
  require_stop_loss: true   # Always use stop-loss
  default_stop_loss_pct: 0.08
