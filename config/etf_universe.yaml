# Safe-haven / cash-equivalent ETFs
safe_haven:
  - SHY   # 1-3yr Treasury
  - TLT   # 20+yr Treasury
  - GLD   # Gold
  - UUP   # US Dollar

# VIX-related
volatility:
  - VXX   # VIX Short-Term Futures
  - UVXY  # 2x VIX
  - SVXY  # -0.5x VIX

# Exchange codes for KIS API (NASD=Nasdaq, NYSE, AMEX=NYSE Arca)
# Most ETFs trade on NYSE Arca (AMEX). Only list exceptions here.
# ETFs not listed default to AMEX.
exchanges:
  TQQQ: NASD
  SQQQ: NASD
  QQQ: NASD
  ARKK: NASD
  SARK: NASD
  SOXX: NASD
  SOXL: NASD
  SOXS: NASD
  TECL: NASD
  TECS: NASD
  SHY: NASD
  TLT: NASD

# Risk limits for leveraged ETFs
# 2026-05-07: ETF engine re-enabled with conservative caps (user request).
# Bug fix (cash_available semantics) makes the engine actually buy now;
# caps lowered to keep total ETF exposure bounded while we build up live
# evidence — there's no backtest harness for the ETF engine.
risk_rules:
  max_hold_days: 20                    # No holding leveraged >20 days (backtest: 10d too short)
  max_portfolio_pct: 0.10              # 2026-05-07: 0.20 → 0.10 (conservative re-enable)
  max_single_etf_pct: 0.05             # 2026-05-07: 0.10 → 0.05 (conservative re-enable)
  require_stop_loss: true              # Always use stop-loss
  default_stop_loss_pct: 0.08
  min_hold_leveraged_hours: 4          # Min 4h hold for leveraged ETFs before selling
  min_hold_sector_hours: 2             # Min 2h hold for sector ETFs before selling
  sell_cooldown_hours: 4               # Don't rebuy same ETF for 4h after selling
