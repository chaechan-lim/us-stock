services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DB_URL: postgresql+asyncpg://usstock:usstock@host.docker.internal:5432/us_stock_trading
      REDIS_URL: redis://host.docker.internal:6379/1
    volumes:
      - ./config:/app/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3002:80"
    depends_on:
      - backend
    restart: unless-stopped
