[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    "alembic/*",
    "main.py",
    "mcp_server.py",
    "config.py",
    "scripts/*",
    "backtest/*",
    "api/*",
    "exchange/*",
    "db/session.py",
]

[tool.coverage.report]
fail_under = 85
show_missing = true
