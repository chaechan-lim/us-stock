# US Stock Auto-Trading - Strategy Configuration
# All strategy parameters, weights, and SL/TP are managed here.
# Runtime hot-reload supported via StrategyRegistry.reload_config()
#
# ─────────────────────────────────────────────────────────────────────────
# ⚠ Backtest reliability note (2026-04-08)
# ─────────────────────────────────────────────────────────────────────────
# Inline parameter comments tagged "optimized: X -> Y" or "walk-forward
# confirmed" without an explicit source were produced before commit
# ff6279f (2026-04-07 09:37 KST) which fixed look-ahead bias, Kelly param
# mismatch, asymmetric slippage, and the KR currency silently-zero-trades
# bug. Treat them as INDICATIVE only — they are not guaranteed to still
# be optimal under fresh backtests.
#
# When changing any parameter or strategy enable/disable, the convention
# going forward is:
#   1. Run a fresh full pipeline backtest (post-ff6279f code).
#   2. In the comment, cite (a) the script path, (b) the period, (c) the
#      baseline vs new metrics (Ret, Sharpe, MDD, PF, Trades, Alpha).
#   3. Mark the entry with the date and a 2-line summary of the change.
# See markets.US / markets.KR comments below for the format.
# ─────────────────────────────────────────────────────────────────────────

global:
  min_confidence: 0.50
  evaluation_interval_sec: 300
  max_active_strategies: 6
  signal_combination: weighted_vote  # weighted_vote | majority | highest_confidence
  # Held-position exit tuning (STOCK-7): lower the bar for selling existing positions
  # STOCK-47: Raised thresholds to reduce whipsaw buy→stop-loss→rebuy cycles.
  # Backtest (30-day replay, compare_whipsaw.py): whipsaw cycles 2→0, loss sells -37.5%,
  # PnL +309,843 KRW. Note: CAGR/Sharpe/MDD thresholds apply to new strategies;
  # these are evaluation-loop tuning parameters validated via the whipsaw replay.
  held_sell_bias: 0.05          # SELL confidence boost when evaluating held stocks (was 0.10)
  held_min_confidence: 0.40     # min_confidence for held positions (was 0.25)
  stale_pnl_threshold: -0.05   # P&L below this + HOLD signal → sell on indifference (was -0.03)
  # NOTE (STOCK-47): Additional anti-whipsaw constants (min hold 4h, hard SL -7%,
  # max 2 loss sells/7d) are hardcoded in EvaluationLoop.__init__ and are not
  # currently loaded from YAML. They are intentionally not listed here to avoid
  # giving operators the false impression of hot-reload configurability.
  # Profit-taking: sell a portion at intermediate gain before full TP
  profit_taking:
    enabled: true
    threshold_pct: 0.06    # 6% gain triggers partial sell
    sell_ratio: 0.50       # sell 50% of position
  # Strategy-level profit-exit evaluation (STOCK-21)
  # Used by BaseStrategy.evaluate_exit() when position is profitable
  profit_exit:
    sell_confidence_boost_min_pnl: 0.02   # min PnL% to boost SELL confidence
    sell_confidence_boost_factor: 0.5     # confidence += PnL% * factor
    sell_confidence_boost_max: 0.15       # max confidence boost
    profit_take_min_pnl: 0.05            # min PnL% to trigger profit-take on HOLD
    profit_take_base_confidence: 0.65     # base confidence for profit-take SELL
    profit_take_weakness_required: 1      # min weakness indicators (0-3) needed
    rsi_overbought: 70.0                 # RSI threshold for technical weakness
    volume_weakness_ratio: 0.8           # volume/MA ratio below = weakness
    # High-profit auto-sell — sell without weakness at very high PnL
    # Raised from 10% to 25% to let winners run longer
    high_profit_auto_sell_pnl: 0.25      # 25%+ PnL → auto-SELL on HOLD (no weakness needed)
    high_profit_auto_sell_confidence: 0.70  # base confidence for auto-sell
  # Profit protection — evaluation loop safety net
  # When all strategies say HOLD but unrealized gain is very high,
  # generate SELL to prevent unrealized gains from evaporating.
  # Raised from 10% to 25% to avoid capping winners too early
  profit_protection_pct: 0.25             # 25%+ unrealized gain → force SELL
  # STOCK-61: Hard stop-loss threshold that bypasses min_hold (4 hours)
  # When P&L drops below this, position is sold immediately even if not held 4h yet.
  # Set to -15% to only trigger on genuine crashes, not normal 5-7% dips.
  hard_sl_pct: -0.15                      # -15% hard SL that bypasses min_hold
  # Default trailing stop for strategies without explicit config
  # Raised activation from 4% to 8% to avoid clipping early winners
  trailing_stop_defaults:
    activation_pct: 0.08   # activate after 8% gain
    trail_pct: 0.04        # sell if drops 4% from peak
  # Tiered trailing stop: tighter trail at higher gain levels (STOCK-24)
  # Protects large unrealized gains without cutting early winners.
  # Each tier: {gain_pct: activation threshold, trail_pct: trail from peak}
  tiered_trailing_stop:
    enabled: true
    tiers:
      - gain_pct: 0.05    # 5% gain (early protection)
        trail_pct: 0.03   # 3% trail from peak
      - gain_pct: 0.10    # 10% gain
        trail_pct: 0.05   # 5% trail from peak
      - gain_pct: 0.15    # 15% gain
        trail_pct: 0.04   # 4% trail (tighter)
      - gain_pct: 0.20    # 20% gain
        trail_pct: 0.03   # 3% trail (tightest)
  # Breakeven stop: ratchets SL upward as price approaches TP (STOCK-24)
  # Prevents large winners from turning into losers.
  breakeven_stop:
    enabled: true
    activation_ratio: 0.50  # activate at 50% of TP reached
    lock_ratio: 0.75        # at 75% of TP, lock gains
    lock_pct: 0.50          # lock 50% of peak gain

# Market state -> strategy weight profiles
profiles:
  strong_uptrend:
    trend_following: 0.17
    dual_momentum: 0.13
    cross_sectional_momentum: 0.10
    quality_factor: 0.05
    pead_drift: 0.07
    donchian_breakout: 0.08
    supertrend: 0.10
    cis_momentum: 0.05
    larry_williams: 0.07
    bnf_deviation: 0.05
    volume_surge: 0.13

  uptrend:
    trend_following: 0.12
    dual_momentum: 0.12
    cross_sectional_momentum: 0.08
    quality_factor: 0.07
    pead_drift: 0.07
    donchian_breakout: 0.08
    supertrend: 0.10
    macd_histogram: 0.05
    cis_momentum: 0.04
    larry_williams: 0.07
    bnf_deviation: 0.05
    volume_surge: 0.15

  sideways:
    trend_following: 0.05
    dual_momentum: 0.05
    cross_sectional_momentum: 0.05
    quality_factor: 0.08
    pead_drift: 0.05
    donchian_breakout: 0.05
    supertrend: 0.05
    macd_histogram: 0.08
    rsi_divergence: 0.12
    bollinger_squeeze: 0.12
    volume_profile: 0.08
    cis_momentum: 0.02
    larry_williams: 0.05
    bnf_deviation: 0.05
    volume_surge: 0.10

  weak_downtrend:
    # Early downtrend: reduce exposure, favor defensive strategies
    dual_momentum: 0.10
    cross_sectional_momentum: 0.03
    quality_factor: 0.07
    pead_drift: 0.03
    rsi_divergence: 0.20
    bollinger_squeeze: 0.12
    bnf_deviation: 0.25
    volume_surge: 0.10
    regime_switch: 0.10

  downtrend:
    # Full downtrend: minimal stock buys, ETF engine takes over
    rsi_divergence: 0.30
    bnf_deviation: 0.40
    volume_surge: 0.10
    regime_switch: 0.20

  etf_engine:
    regime_switch: 0.55
    sector_rotation: 0.45

# Stock category -> strategy weight profiles
# Stocks are auto-classified by volatility, momentum, and trend characteristics
stock_profiles:
  growth_momentum:
    # High-growth stocks with strong momentum (e.g. NVDA, META)
    dual_momentum: 0.18
    cross_sectional_momentum: 0.12
    trend_following: 0.16
    supertrend: 0.12
    sector_rotation: 0.08
    donchian_breakout: 0.10
    volume_surge: 0.08
    pead_drift: 0.06
    cis_momentum: 0.05
    regime_switch: 0.05

  stable_large_cap:
    # Stable blue-chips with low volatility (e.g. AAPL, MSFT, JNJ)
    trend_following: 0.14
    quality_factor: 0.12
    donchian_breakout: 0.12
    rsi_divergence: 0.12
    bnf_deviation: 0.10
    macd_histogram: 0.09
    pead_drift: 0.08
    larry_williams: 0.08
    bollinger_squeeze: 0.08
    dual_momentum: 0.05
    volume_profile: 0.02

  cyclical_value:
    # Cyclical/value stocks sensitive to macro (e.g. JPM, XOM)
    sector_rotation: 0.16
    regime_switch: 0.14
    bnf_deviation: 0.13
    dual_momentum: 0.12
    trend_following: 0.11
    rsi_divergence: 0.09
    donchian_breakout: 0.09
    pead_drift: 0.08
    volume_surge: 0.05
    volume_profile: 0.03

  high_volatility:
    # High-volatility stocks needing careful risk management
    supertrend: 0.18
    rsi_divergence: 0.15
    bnf_deviation: 0.15
    donchian_breakout: 0.13
    volume_surge: 0.10
    trend_following: 0.09
    bollinger_squeeze: 0.08
    pead_drift: 0.06
    cis_momentum: 0.03
    macd_histogram: 0.03

# Adaptive weight blending
adaptive:
  alpha: 0.6              # 0.6 = 60% category-based, 40% adaptive
  ema_decay: 0.1           # EMA decay for performance tracking
  min_signals: 5           # Min signals before adaptive weights activate
  reclassify_interval: 86400  # Re-classify stocks every 24h

# Group consensus mechanism for SignalCombiner
# Adjusts effective weights based on intra-group agreement/disagreement
consensus:
  enabled: true
  min_group_signals: 2        # Min active (non-HOLD) signals in group to apply
  consensus_boost: 0.30       # Weight boost for majority-aligned signals
  discord_penalty: 0.40       # Weight penalty for minority/tied signals
  groups:
    trend:
      - trend_following
      - dual_momentum
      - cross_sectional_momentum
      - pead_drift
      - donchian_breakout
      - supertrend
      - cis_momentum
      - larry_williams
    mean_reversion:
      - rsi_divergence
      - bollinger_squeeze
      - bnf_deviation
      - macd_histogram
      - volume_profile

# Individual strategy parameters
strategies:
  trend_following:
    enabled: true
    timeframe: "1D"
    params:
      ema_fast: 20          # optimized (unchanged)
      ema_slow: 50          # optimized (unchanged)
      ema_long: 200
      adx_period: 14
      adx_threshold: 20     # optimized: 25 -> 20
      volume_ma_period: 20
      volume_min_ratio: 1.0
    stop_loss:
      type: fixed_pct
      max_pct: 0.10         # SL/TP optimized: 0.08 -> 0.10
    trailing_stop:
      enabled: true
      activation_pct: 0.08  # SL/TP optimized: 0.05 -> 0.08
      trail_pct: 0.05       # SL/TP optimized: 0.03 -> 0.05

  dual_momentum:
    enabled: true
    timeframe: "1M"
    params:
      lookback_months: 18   # optimized: 12 -> 18
      top_n: 5
      rebalance_day: 1
      min_absolute_return: 0.0
      cash_etf: "SHY"
    stop_loss:
      type: fixed_pct
      max_pct: 0.10

  donchian_breakout:
    enabled: true
    timeframe: "1D"
    params:
      entry_period: 15       # walk-forward: 20 -> 15
      exit_period: 7         # walk-forward: 10 -> 7
      adx_threshold: 20.0    # walk-forward: 25 -> 20
      volume_multiplier: 1.5
    stop_loss:
      type: fixed_pct
      max_pct: 0.08         # SL/TP optimized: moderate
    take_profit:
      type: fixed_pct
      max_pct: 0.20         # SL/TP optimized: moderate
    trailing_stop:
      enabled: true
      activation_pct: 0.06
      trail_pct: 0.04

  supertrend:
    enabled: true
    timeframe: "1D"
    params:
      atr_period: 7          # optimized + walk-forward confirmed
      multiplier: 2.0        # optimized + walk-forward confirmed
      confirmation_bars: 1   # walk-forward: 3 -> 1 (more robust)
    stop_loss:
      type: supertrend
    trailing_stop:
      enabled: true
      activation_pct: 0.08
      trail_pct: 0.05

  macd_histogram:
    enabled: true
    timeframe: "1D"
    params:
      fast_period: 8         # optimized: 12 -> 8
      slow_period: 20        # optimized: 26 -> 20
      signal_period: 7       # optimized: 9 -> 7
      divergence_lookback: 14
      min_histogram_change: 0.5
    stop_loss:
      type: fixed_pct
      max_pct: 0.05

  rsi_divergence:
    enabled: true
    timeframe: "1D"
    params:
      rsi_period: 10         # optimized: 14 -> 10
      overbought: 75         # optimized: 70 -> 75
      oversold: 35           # optimized: 30 -> 35
      divergence_lookback: 14
      min_price_move_pct: 3.0
    stop_loss:
      type: fixed_pct
      max_pct: 0.04

  bollinger_squeeze:
    enabled: true
    timeframe: "1D"
    params:
      bb_period: 20
      bb_std: 2.0
      keltner_period: 20
      keltner_atr_mult: 1.5
      squeeze_min_bars: 5   # optimized: 3 -> 5
    stop_loss:
      type: atr
      atr_multiplier: 1.5

  volume_profile:
    enabled: true
    timeframe: "1D"
    params:
      lookback_days: 40          # optimized: 60 -> 40
      volume_surge_threshold: 1.5 # optimized: 2.0 -> 1.5
      obv_ma_period: 20
    stop_loss:
      type: fixed_pct
      max_pct: 0.05

  regime_switch:
    enabled: true
    timeframe: "1D"
    params:
      spy_sma_period: 200
      vix_bull_threshold: 18   # optimized: 20 -> 18
      vix_bear_threshold: 23   # optimized: 25 -> 23
      confirmation_days: 2
      max_leverage_etf_hold_days: 10
    etf_mapping:
      bull: [TQQQ, SOXL, UPRO, TECL, FNGU]
      bear: [SQQQ, SOXS, SPXU, TECS, FNGD]
      neutral: [QQQ, SOXX, SPY, XLK]

  cis_momentum:
    enabled: true
    timeframe: "1D"
    params:
      roc_short: 5           # optimized (unchanged)
      roc_long: 15           # optimized: 10 -> 15
      roc_short_buy: 2.0     # optimized: 3.0 -> 2.0
      roc_long_buy: 5.0     # stocks: 5% (crypto was 3%)
      roc_short_sell: -3.0
      roc_long_sell: -5.0
      volume_ratio_threshold: 1.2
      # STOCK-35: trend filter — prevent buying into downtrends
      trend_sma_period: 50
      # STOCK-35: momentum decay exit — catch gradual declines
      roc_short_sell_weak: -1.0   # softer than roc_short_sell (-3.0)
      roc_long_sell_weak: -2.0    # softer than roc_long_sell (-5.0)
    stop_loss:
      type: fixed_pct
      max_pct: 0.12         # SL/TP optimized: wide
    take_profit:
      type: fixed_pct
      max_pct: 0.20         # lowered: 0.30 -> 0.20 (realistic target)
    trailing_stop:
      enabled: true
      activation_pct: 0.06
      trail_pct: 0.04

  larry_williams:
    enabled: true
    timeframe: "1D"
    params:
      k: 1.0                # optimized: 0.5 -> 1.0
      willr_period: 10       # optimized: 14 -> 10
      willr_oversold: -80.0
      willr_overbought: -20.0
      sma_period: 20
    stop_loss:
      type: atr
      atr_multiplier: 1.5
      max_pct: 0.06
    trailing_stop:
      enabled: true
      activation_pct: 0.04
      trail_pct: 0.025

  bnf_deviation:
    enabled: true
    timeframe: "1D"
    params:
      sma_period: 20         # optimized: 25 -> 20
      buy_deviation: -5.0    # optimized (unchanged)
      sell_deviation: 3.0    # optimized (unchanged)
      rsi_boost_threshold: 35.0
    stop_loss:
      type: fixed_pct
      max_pct: 0.05

  volume_surge:
    enabled: true
    timeframe: "1D"
    params:
      volume_threshold: 1.8     # min volume ratio vs 20-day avg
      confirmation_bars: 1      # bars of elevated volume before signal
      min_price_change: 0.3     # min % price change to trigger
    stop_loss:
      type: atr
      atr_multiplier: 2.0
      max_pct: 0.06
    trailing_stop:
      enabled: true
      activation_pct: 0.03
      trail_pct: 0.02

  sector_rotation:
    enabled: true
    timeframe: "1M"
    params:
      top_sectors: 2         # optimized: 3 -> 2
      lookback_weeks: 16     # optimized: 12 -> 16
      rebalance_day: 1
      min_strength_score: 60
    sector_etfs:
      Technology: [XLK, TECL]
      Financials: [XLF, FAS]
      Energy: [XLE, ERX]
      Healthcare: [XLV, LABU]
      Consumer_Disc: [XLY]
      Consumer_Staples: [XLP]
      Industrials: [XLI]
      Materials: [XLB]
      Utilities: [XLU]
      Real_Estate: [XLRE]
      Communications: [XLC]

  cross_sectional_momentum:
    enabled: true
    timeframe: "1D"
    params:
      lookback_days: 252       # 12-month lookback
      skip_days: 21            # skip last month (reversal avoidance)
      min_momentum: 0.05       # 5% min 12-1 return for BUY
      sell_momentum_threshold: -0.05
      volume_confirm: true
      volume_ratio_threshold: 0.8
      reversal_filter: true
      reversal_threshold: -0.05
    stop_loss:
      type: atr
      atr_multiplier: 2.5
      max_pct: 0.12
    take_profit:
      type: fixed_pct
      max_pct: 0.20
    trailing_stop:
      enabled: true
      activation_pct: 0.08
      trail_pct: 0.04

  quality_factor:
    enabled: true
    timeframe: "1D"
    params:
      lookback_days: 126       # 6-month quality assessment
      vol_lookback: 60         # 60-day volatility window
      max_volatility: 0.40     # max annualized vol ratio for BUY (40%)
      min_up_ratio: 0.52       # min fraction of positive return days
      min_sharpe: 0.5          # min annualized Sharpe
      max_drawdown: -0.15      # max drawdown threshold
      sell_quality_threshold: 0.25
    stop_loss:
      type: atr
      atr_multiplier: 2.5
      max_pct: 0.12
    take_profit:
      type: fixed_pct
      max_pct: 0.20
    trailing_stop:
      enabled: true
      activation_pct: 0.08
      trail_pct: 0.04

  pead_drift:
    enabled: true
    timeframe: "1D"
    params:
      gap_threshold: 0.03       # 3% min gap to qualify as earnings-like
      volume_multiplier: 2.0    # 2x avg volume confirms gap significance
      drift_window: 5           # 5-day drift confirmation window
      max_entry_delay: 10       # max days after gap to enter
      min_follow_through: 0.005 # 0.5% min follow-through
      fade_protection: true     # skip if gap has reversed >50%
    stop_loss:
      type: atr
      atr_multiplier: 2.0
      max_pct: 0.10
    take_profit:
      type: fixed_pct
      max_pct: 0.15
    trailing_stop:
      enabled: true
      activation_pct: 0.06
      trail_pct: 0.03

# Market-specific overrides
# Each market key can override: disabled_strategies, risk, evaluation_loop
markets:
  US:
    # NOTE on backtest metrics in this file:
    # Any backtest figure quoted below is from a fresh run AFTER commit
    # ff6279f (2026-04-07 09:37 KST) which fixed look-ahead bias, Kelly
    # param mismatch, asymmetric slippage, and the KR currency
    # silently-zero-trades bug. Earlier numbers (e.g. "Return=8.6% Sharpe=0.64",
    # "+114K dual_momentum", "-110K supertrend KR") cited in prior versions
    # of this file came from broken backtest paths and were removed
    # 2026-04-08. When changing this section, run a fresh full pipeline
    # backtest first and quote both the run command and the metric.
    #
    # 2026-04-08 (commit pending) — donchian_breakout US disable:
    #   Source: backend/scripts/verify_donchian_disable.py (US 2y, max_pos=20,
    #   8% pos pct, fresh data, all post-ff6279f fixes applied).
    #   Baseline:  Ret +8.0%, Sharpe 0.47, MDD -3.9%, PF 1.21, 341 trades, Alpha -24.0%
    #   Disabled:  Ret +9.5%, Sharpe 0.59, MDD -5.8%, PF 1.25, 360 trades, Alpha -22.4%
    #   Per-strategy:  donchian_breakout = 77 trades, WR 43%, PnL -$1,856
    #     (single largest US loser; absorbed into dual_momentum +$1,728 after disable).
    #   Profile weights left in place; market-level disable filters it out.
    # 2026-04-09: dual_momentum disabled — confirmed bleeder by both
    # backtest and 9-day live data analysis (analyze_trade_patterns.py).
    #   Live: 10 trades, 3W/7L, avg -2.28%, worst -10.22% (FANG)
    #         3 of 5 SMALL_WIN_BIG_LOSS cases (FANG/CVE/XOM stop_loss)
    #   Backtest 2y: -$3,865 contribution
    # Strategy thesis (12-18mo lookback) doesn't fit user's burst-catching
    # goal — see docs/STRATEGY_REDESIGN.md §2.
    disabled_strategies:
      - bollinger_squeeze
      - volume_profile
      - cis_momentum
      - larry_williams
      - bnf_deviation
      - donchian_breakout
      - dual_momentum
    # Cash parking — recovers ~13pp alpha by parking idle cash in SPY
    # instead of letting it sit through low-conviction periods.
    # Source: backend/scripts/validate_cash_parking.py V1_park_30 (US 2y, wide universe).
    #   V0_no_parking : Ret +1.2%   Sharpe -0.25  Alpha -30.7%
    #   V1_park_30    : Ret +14.5%  Sharpe +0.72  Alpha -17.5%  ← winner
    #   V2_park_20    : Ret +11.0%  Sharpe +0.52  Alpha -21.0%
    #   V3_park_50    : Ret +11.8%  Sharpe +0.57  Alpha -20.2%
    #   V4_park_10    : Ret +13.3%  Sharpe +0.65  Alpha -18.7%
    # 2026-04-11: Re-enabled after rewrite. Previous version caused 93 SPY
    # round-trips in 2 days (~860k KRW in commissions) because unpark fired
    # every 5-min cycle regardless of actual buy needs. New invariants:
    #   - Park ONCE when cash > threshold, hold indefinitely
    #   - No preemptive unpark (removed _unpark_cash_for_buys entirely)
    #   - 1-hour cooldown between park actions
    #   - Pending-order check prevents duplicate BUY orders
    #   - SPY position is sold only by strategy signals or manual action
    cash_parking:
      enabled: true
      symbol: SPY
      threshold: 0.30   # park when cash > 30% of equity
      buffer: 0.10      # keep 10% of equity in cash for opportunities
  KR:
    # 2026-04-08 — full KR re-evaluation after the KR-currency bug fix
    #   (full_pipeline.py initial_equity now auto-scales to 100M KRW).
    # All earlier KR backtest claims (e.g. "+114K dual_momentum",
    # "-110K supertrend") are invalidated because they were produced when
    # the simulator silently rounded position sizes to 0 — see
    # data/backtest_results stale flag for affected entries.
    #
    # Source: backend/scripts/verify_kr_no_trend_following.py (KR 2y,
    # max_pos=15, 8% pos pct, slippage 0.08, post-ff6279f).
    #   KR_baseline (4-07 신규 포함):    431 trades  -2.5%  Sharpe -0.44  PF 0.95
    #   KR_no_trend_following:          425 trades  -5.7%  Sharpe -0.74  PF 0.89
    #   KR_no_donchian:                 436 trades  -8.0%  Sharpe -0.93  PF 0.86
    #   KR_no_tf_no_donchian:           507 trades  -2.3%  Sharpe -0.34  PF 0.96
    #   KR_only_dual_mom:               311 trades  +3.0%  Sharpe -0.03  PF 1.09  ← only positive variant
    #   KR_lower_minconf (0.30):        438 trades  -4.0%  Sharpe -0.54  PF 0.93
    # Per-strategy contribution (KR_no_tf_no_donchian):
    #   dual_momentum:              272 trades  WR 66%  PnL +₩4,746,249
    #   pead_drift:                  28 trades  WR 54%  PnL -₩1,679,868
    #   cross_sectional_momentum:   206 trades  WR 57%  PnL -₩5,490,055
    #   quality_factor:               1 trade           PnL +₩110,040
    # Decision: keep dual_momentum as the only proven KR strategy and the
    # 4-07 newly-added 3 strategies disabled. trend_following + donchian
    # remain enabled because removing them BOTH (KR_no_tf_no_donchian)
    # only marginally helps and KR_only_dual_mom is the cleaner choice.
    disabled_strategies:
      - supertrend
      - macd_histogram
      - rsi_divergence
      - bollinger_squeeze
      - volume_profile
      - regime_switch
      - sector_rotation
      - cis_momentum
      - larry_williams
      - bnf_deviation
      - volume_surge
      - cross_sectional_momentum
      - pead_drift
      - quality_factor
    # Cash parking off for KR until validated. KR full-pipeline backtest
    # is currently broken-then-fixed (currency bug, see project memory),
    # so we don't yet have a clean validation run for parking in KR.
    # Re-enable after running validate_cash_parking.py with market=KR.
    cash_parking:
      enabled: false
      symbol: "069500"  # KODEX 200
      threshold: 0.30
      buffer: 0.10
    risk:
      kelly_fraction: 0.40       # Conservative (was 1.00, full Kelly too aggressive)
      max_position_pct: 0.10     # 10% per position (was 0.30)
      min_position_pct: 0.04     # 4% min (was 0.15)
      max_positions: 12
      default_stop_loss_pct: 0.12  # 12% SL (was 0.15)
      default_take_profit_pct: 0.20
      dynamic_sl_tp: true        # Enable ATR-based dynamic SL/TP
    evaluation_loop:
      min_confidence: 0.40       # Higher quality filter (was 0.20)
      min_active_ratio: null
      sell_cooldown_days: 1
      whipsaw_max_losses: 2
      min_hold_days: 1

# Screening pipeline settings
screening:
  indicator_screener:
    weights:
      trend: 0.40
      momentum: 0.25
      volatility_volume: 0.20
      support_resistance: 0.15
    min_grade: "B"
    max_candidates: 50

  fundamental_enricher:
    weights:
      consensus: 0.35
      fundamental: 0.35
      smart_money: 0.30

  ai_recommender:
    score_blend:
      indicator_weight: 0.35
      enrichment_weight: 0.25
      ai_weight: 0.40
